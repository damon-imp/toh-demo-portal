<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOH Portal | The Optimized Human</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --bg:#1A1A1A;--bg2:#222222;--bg3:#2a2a2a;--bg4:#333333;
  --purple:#AC66A7;--purple2:#8a4d87;--purple3:#c789c2;--purple4:#6a3767;
  --green:#34D399;--green2:#10b981;
  --amber:#f5b041;--amber2:#d4880c;
  --red:#ef6b6b;--red2:#c94040;
  --blue:#66b0f0;--cyan:#3de0f0;
  --t1:#FFFFFF;--t2:#e8e8e8;--t3:#cfcfcf;--t4:#999999;--t5:#666666;--t6:#4a4a4a;
  --border:#2f2f2f;--border2:#3a3a3a;--border3:#4a4a4a;
  --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
  --role-js:#AC66A7;--role-fb:#c789c2;--role-br:#66b0f0;--role-mt:#f5b041;--role-ghl:#999999;--role-cl:#34D399;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--t2);font-family:var(--font);min-height:100vh;font-size:14.5px;letter-spacing:-0.005em;-webkit-font-smoothing:antialiased}
body{background-image:radial-gradient(ellipse 1200px 800px at 15% 0%,rgba(172,102,167,0.05) 0%,transparent 55%),radial-gradient(ellipse 900px 700px at 85% 10%,rgba(52,211,153,0.025) 0%,transparent 50%);background-attachment:fixed}
button,input,select,textarea{font-family:var(--font);letter-spacing:-0.01em}
::selection{background:var(--purple);color:var(--t1)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
a{color:inherit;text-decoration:none}
.brand-gradient{background:linear-gradient(135deg,var(--purple),var(--purple3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ==== TOP HEADER ==== */
.app-header{position:sticky;top:0;z-index:50;background:rgba(26,26,26,0.88);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.app-brand{display:flex;align-items:center;gap:12px;cursor:pointer;transition:opacity 0.2s}
.app-brand:hover{opacity:0.78}
.app-mark{width:36px;height:36px;border-radius:10px;background:var(--purple);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:var(--t1);letter-spacing:-0.04em}
.app-brand-txt{display:flex;flex-direction:column;line-height:1}
.app-brand-top{font-weight:500;font-size:9px;color:var(--t4);letter-spacing:0.16em;text-transform:uppercase;margin-bottom:3px;font-family:var(--mono)}
.app-brand-bot{font-weight:700;font-size:15px;color:var(--t1);letter-spacing:-0.02em}

/* Demo mode pill */
.demo-pill{display:flex;align-items:center;gap:7px;padding:5px 11px;border-radius:14px;background:rgba(245,176,65,0.1);border:1px solid rgba(245,176,65,0.3);color:var(--amber);font-size:10.5px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;font-family:var(--mono)}
.demo-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--amber);animation:pulse 2.4s infinite}

/* Role switcher */
.role-switcher{display:flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:3px}
.role-btn{padding:7px 14px;background:transparent;border:none;color:var(--t4);font-size:12.5px;font-weight:600;cursor:pointer;border-radius:7px;transition:all 0.2s;display:flex;align-items:center;gap:7px;letter-spacing:-0.005em}
.role-btn:hover{color:var(--t2)}
.role-btn.active{background:var(--bg3);color:var(--t1)}
.role-btn .role-init{display:inline-flex;width:20px;height:20px;border-radius:6px;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t1);font-family:var(--mono);letter-spacing:0}
.role-btn[data-role="CL"] .role-init{background:var(--green)}
.role-btn[data-role="JS"] .role-init{background:var(--purple)}
.role-btn[data-role="FB"] .role-init{background:var(--purple3);color:var(--bg)}
.role-btn[data-role="BR"] .role-init{background:var(--blue);color:var(--bg)}

.header-right{display:flex;align-items:center;gap:14px}
.user-pill{display:flex;align-items:center;gap:10px;padding:6px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px}
.user-avatar{width:28px;height:28px;border-radius:8px;background:var(--purple);color:var(--t1);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;font-family:var(--mono)}
.user-info{display:flex;flex-direction:column;line-height:1.15}
.user-name{font-size:12.5px;font-weight:600;color:var(--t1)}
.user-role{font-size:10px;color:var(--t4);font-family:var(--mono);letter-spacing:0.05em;text-transform:uppercase}

/* ==== APP SHELL ==== */
.app-shell{display:flex;min-height:calc(100vh - 64px)}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);padding:22px 14px;flex-shrink:0}
.sidebar-section{margin-bottom:18px}
.sidebar-label{font-size:10px;font-weight:600;color:var(--t5);letter-spacing:0.14em;text-transform:uppercase;padding:0 10px;margin-bottom:8px;font-family:var(--mono)}
.sidebar-link{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:8px;color:var(--t4);font-size:13.5px;font-weight:500;cursor:pointer;transition:all 0.2s;margin-bottom:2px;border:none;background:transparent;width:100%;text-align:left;font-family:var(--font)}
.sidebar-link:hover{background:var(--bg3);color:var(--t2)}
.sidebar-link.active{background:rgba(172,102,167,0.12);color:var(--purple3);font-weight:600}
.sidebar-link .ico{font-size:15px;width:18px;display:inline-flex;justify-content:center}
.sidebar-link .count{margin-left:auto;font-size:10.5px;background:var(--bg4);color:var(--t3);padding:2px 7px;border-radius:10px;font-family:var(--mono);font-weight:600}
.sidebar-link.active .count{background:var(--purple);color:var(--t1)}

.main-content{flex:1;padding:28px;overflow-x:hidden}
.page-head{margin-bottom:22px}
.page-eyebrow{font-size:11px;font-weight:600;color:var(--purple3);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:7px;font-family:var(--mono)}
.page-title{font-size:26px;font-weight:700;letter-spacing:-0.025em;color:var(--t1);margin-bottom:6px}
.page-sub{font-size:14px;color:var(--t4);line-height:1.55}

/* ==== SHARED COMPONENTS ==== */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px}
.card-sm{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:14px}
.card-title{font-size:14px;font-weight:700;color:var(--t1);letter-spacing:-0.01em}
.card-sub{font-size:12px;color:var(--t4);margin-top:2px}

.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--t2);transition:all 0.2s;letter-spacing:-0.005em}
.btn:hover{background:var(--bg4);color:var(--t1);border-color:var(--border3)}
.btn-primary{background:var(--purple);border-color:var(--purple);color:var(--t1)}
.btn-primary:hover{background:var(--purple2);border-color:var(--purple2)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--t4)}
.btn-ghost:hover{background:var(--bg3);color:var(--t1);border-color:transparent}
.btn-sm{padding:6px 11px;font-size:12px}
.btn-icon{width:32px;height:32px;padding:0;justify-content:center;border-radius:8px}

.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:12px;font-size:10.5px;font-weight:600;letter-spacing:0.04em;font-family:var(--mono)}
.badge-green{background:rgba(52,211,153,0.12);color:var(--green);border:1px solid rgba(52,211,153,0.3)}
.badge-amber{background:rgba(245,176,65,0.12);color:var(--amber);border:1px solid rgba(245,176,65,0.3)}
.badge-red{background:rgba(239,107,107,0.12);color:var(--red);border:1px solid rgba(239,107,107,0.3)}
.badge-purple{background:rgba(172,102,167,0.12);color:var(--purple3);border:1px solid rgba(172,102,167,0.3)}
.badge-gray{background:var(--bg3);color:var(--t4);border:1px solid var(--border2)}
.badge-blue{background:rgba(102,176,240,0.12);color:var(--blue);border:1px solid rgba(102,176,240,0.3)}
.badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

.tbd-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600;background:rgba(245,176,65,0.1);color:var(--amber);border:1px dashed rgba(245,176,65,0.4);letter-spacing:0.06em;font-family:var(--mono);text-transform:uppercase}

.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:10px;font-size:10.5px;font-weight:600;font-family:var(--mono);letter-spacing:0.04em}
.pill-role-JS{background:rgba(172,102,167,0.15);color:var(--purple3);border:1px solid rgba(172,102,167,0.3)}
.pill-role-FB{background:rgba(199,137,194,0.15);color:var(--purple3);border:1px solid rgba(199,137,194,0.3)}
.pill-role-BR{background:rgba(102,176,240,0.15);color:var(--blue);border:1px solid rgba(102,176,240,0.3)}
.pill-role-MT{background:rgba(245,176,65,0.15);color:var(--amber);border:1px solid rgba(245,176,65,0.3)}
.pill-role-GHL{background:rgba(153,153,153,0.1);color:var(--t4);border:1px solid var(--border2)}
.pill-role-CL{background:rgba(52,211,153,0.15);color:var(--green);border:1px solid rgba(52,211,153,0.3)}

.divider{height:1px;background:var(--border);margin:18px 0}

/* ==== CLIENT DASHBOARD ==== */
.hero-progress{background:linear-gradient(135deg,var(--bg2) 0%,rgba(172,102,167,0.06) 100%);border:1px solid var(--border);border-radius:18px;padding:26px 28px;margin-bottom:20px;position:relative;overflow:hidden}
.hp-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;gap:18px}
.hp-title{font-size:13px;font-weight:600;color:var(--purple3);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:6px;font-family:var(--mono)}
.hp-phase{font-size:22px;font-weight:700;color:var(--t1);letter-spacing:-0.02em;margin-bottom:3px}
.hp-sub{font-size:13px;color:var(--t4)}
.hp-day{font-family:var(--mono);font-weight:600;font-size:42px;color:var(--t1);letter-spacing:-0.035em;line-height:1}
.hp-day-sub{font-family:var(--mono);font-size:11px;color:var(--t4);text-align:right;margin-top:3px;letter-spacing:0.05em}
.hp-bar{height:10px;background:var(--bg3);border-radius:8px;overflow:hidden;margin-bottom:10px;position:relative}
.hp-bar-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--purple3));border-radius:8px;transition:width 0.6s ease}
.hp-bar-checkpoints{position:absolute;top:0;left:0;right:0;height:100%;display:flex;justify-content:space-between;padding:0 1px}
.hp-checkpoint{width:2px;height:100%;background:var(--bg4)}
.hp-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10.5px;color:var(--t5);margin-top:8px;letter-spacing:0.04em}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}

.stat-tile{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.stat-tile-lbl{font-size:10.5px;font-weight:600;color:var(--t4);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:7px;font-family:var(--mono)}
.stat-tile-val{font-family:var(--mono);font-weight:600;font-size:24px;color:var(--t1);letter-spacing:-0.025em;line-height:1;margin-bottom:3px}
.stat-tile-trend{font-size:11.5px;color:var(--t4);display:flex;align-items:center;gap:4px;font-family:var(--mono)}
.stat-tile-trend.up{color:var(--green)}
.stat-tile-trend.down{color:var(--red)}

/* Next action card */
.next-action{background:linear-gradient(135deg,rgba(172,102,167,0.08) 0%,var(--bg2) 100%);border:1px solid rgba(172,102,167,0.3);border-radius:14px;padding:20px;margin-bottom:16px}
.na-eyebrow{display:flex;align-items:center;gap:8px;font-size:10.5px;font-weight:600;color:var(--purple3);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:10px;font-family:var(--mono)}
.na-eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--purple);animation:pulse 2.4s infinite}
.na-task{font-size:17px;font-weight:600;color:var(--t1);letter-spacing:-0.01em;margin-bottom:6px;line-height:1.4}
.na-when{font-size:13px;color:var(--t4);margin-bottom:14px}
.na-cta{display:flex;gap:10px}

/* ==== PHASE TIMELINE ==== */
.phase-timeline{display:flex;flex-direction:column;gap:8px}
.phase-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all 0.2s}
.phase-item.current{border-color:var(--purple);background:linear-gradient(180deg,rgba(172,102,167,0.06) 0%,var(--bg2) 100%)}
.phase-item.done{opacity:0.75}
.phase-head{padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;user-select:none}
.phase-num{width:34px;height:34px;border-radius:9px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:600;font-size:12.5px;color:var(--t3);flex-shrink:0}
.phase-item.current .phase-num{background:var(--purple);color:var(--t1)}
.phase-item.done .phase-num{background:var(--green);color:var(--bg)}
.phase-meta{flex:1;min-width:0}
.phase-title{font-size:14.5px;font-weight:600;color:var(--t1);letter-spacing:-0.01em;margin-bottom:2px}
.phase-when{font-size:11.5px;color:var(--t4);font-family:var(--mono);letter-spacing:0.02em}
.phase-status{display:flex;align-items:center;gap:10px;flex-shrink:0}
.phase-prog-mini{width:80px;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.phase-prog-mini-fill{height:100%;background:var(--purple);border-radius:3px}
.phase-count{font-family:var(--mono);font-size:11px;color:var(--t4);font-weight:500;letter-spacing:0.02em}
.phase-chev{color:var(--t5);font-size:11px;transition:transform 0.3s;width:22px;height:22px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center}
.phase-item.open .phase-chev{transform:rotate(180deg);background:var(--purple);color:var(--t1)}
.phase-body{max-height:0;overflow:hidden;transition:max-height 0.4s ease}
.phase-item.open .phase-body{max-height:3000px}
.phase-body-inner{padding:0 18px 16px;border-top:1px solid var(--border)}

.task-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.task-row:last-child{border-bottom:none}
.task-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border3);flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;background:transparent}
.task-check.done{background:var(--green);border-color:var(--green)}
.task-check.done::after{content:'';width:5px;height:9px;border-right:2px solid var(--bg);border-bottom:2px solid var(--bg);transform:rotate(45deg);margin-top:-2px}
.task-text{flex:1;font-size:13.5px;line-height:1.55;color:var(--t2)}
.task-row.done .task-text{color:var(--t5);text-decoration:line-through}
.task-meta{display:flex;gap:8px;margin-top:4px;align-items:center;flex-wrap:wrap}
.task-due{font-size:11px;color:var(--t5);font-family:var(--mono);letter-spacing:0.02em}
.task-behind{color:var(--red);font-weight:600}
.task-today{color:var(--amber);font-weight:600}

/* ==== LABS / BIOMARKERS ==== */
.marker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.marker-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:14px;transition:all 0.2s;cursor:pointer}
.marker-card:hover{border-color:var(--border3);transform:translateY(-1px)}
.marker-name{font-size:11.5px;font-weight:600;color:var(--t3);letter-spacing:-0.005em;margin-bottom:4px}
.marker-cat{font-size:9.5px;color:var(--t5);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.marker-val-row{display:flex;align-items:baseline;gap:8px;margin-bottom:6px}
.marker-val{font-family:var(--mono);font-weight:600;font-size:18px;color:var(--t1);letter-spacing:-0.02em}
.marker-unit{font-size:10.5px;color:var(--t5);font-family:var(--mono)}
.marker-status{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;font-family:var(--mono);letter-spacing:0.02em}
.marker-range{font-size:10px;color:var(--t5);font-family:var(--mono);margin-top:4px}
.marker-delta-up{color:var(--green)}
.marker-delta-down{color:var(--red)}
.marker-delta-flat{color:var(--t5)}

/* Marker detail modal chart */
.chart-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px;margin:14px 0}

/* ==== CONSOLE / PROVIDER ==== */
.flag-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:10px}
.flag-item.critical{border-left:3px solid var(--red)}
.flag-item.warning{border-left:3px solid var(--amber)}
.flag-severity{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.flag-severity.critical{background:rgba(239,107,107,0.12);color:var(--red)}
.flag-severity.warning{background:rgba(245,176,65,0.12);color:var(--amber)}
.flag-body{flex:1;min-width:0}
.flag-title{font-size:13.5px;font-weight:600;color:var(--t1);margin-bottom:2px}
.flag-detail{font-size:12px;color:var(--t4);line-height:1.5}
.flag-meta{display:flex;gap:8px;align-items:center;flex-shrink:0}

/* ==== MESSAGES ==== */
.msg-thread{display:flex;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
.msg-avatar{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:var(--t1);font-family:var(--mono);flex-shrink:0}
.msg-body{flex:1;min-width:0}
.msg-head{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.msg-name{font-size:13px;font-weight:600;color:var(--t1)}
.msg-time{font-size:10.5px;color:var(--t5);font-family:var(--mono);letter-spacing:0.02em}
.msg-text{font-size:13.5px;color:var(--t3);line-height:1.55}

/* Client roster row */
.client-row{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all 0.2s;margin-bottom:8px}
.client-row:hover{border-color:var(--border3);transform:translateX(2px)}
.client-row.selected{border-color:var(--purple);background:linear-gradient(180deg,rgba(172,102,167,0.05) 0%,var(--bg2) 100%)}
.client-avatar{width:40px;height:40px;border-radius:10px;background:var(--purple);color:var(--t1);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;font-family:var(--mono);flex-shrink:0}
.client-meta{flex:1;min-width:0}
.client-name{font-size:14px;font-weight:600;color:var(--t1);letter-spacing:-0.01em;margin-bottom:3px}
.client-sub{font-size:11.5px;color:var(--t4);font-family:var(--mono);letter-spacing:0.02em;display:flex;gap:10px;flex-wrap:wrap}
.client-prog{flex-shrink:0;text-align:right}

// ============================================================================
// DUE DATE HELPERS
// ============================================================================

function taskStatus(task, currentDay) {
  if (task._done) return "done";
  if (task.dueDay < currentDay - 2) return "behind";
  if (Math.abs(task.dueDay - currentDay) <= 1) return "today";
  if (task.dueDay > currentDay) return "upcoming";
  return "today";
}

function phaseProgress(phaseId, currentPhase, phaseDoneStates) {
  if (phaseId < currentPhase) return 1;
  if (phaseId > currentPhase) return 0;
  const tasks = TASKS[phaseId] || [];
  if (!tasks.length) return 0;
  const done = tasks.filter(t => phaseDoneStates[t.id]).length;
  return done / tasks.length;
}

function getPhasesForTrack(track) {
  return track === "12-month" ? PHASES_12MO : PHASES_12WK;
}

// ============================================================================
// SVG CHART COMPONENT
// ============================================================================

function BiomarkerChart({marker, draws}) {
  const def = BIOMARKERS[marker];
  if (!def || !draws.length) return <div style={{color:"var(--t5)", fontSize:13, padding:16, textAlign:"center"}}>No data yet</div>;

  const pts = draws.map(d => ({date: d.date.split(',')[0], label: d.label, value: d.values[marker]})).filter(p => p.value != null);
  if (!pts.length) return <div style={{color:"var(--t5)", fontSize:13, padding:16}}>Marker not tested</div>;

  const vals = pts.map(p => p.value);
  const mn = Math.min(Math.min(...vals), def.lo) * 0.85;
  const mx = Math.max(Math.max(...vals), def.hi) * 1.12;
  const range = mx - mn || 1;
  const W = 620, H = 240, PL = 56, PR = 24, PT = 22, PB = 42;
  const cw = W - PL - PR, ch = H - PT - PB;
  const clr = CAT_COLORS[def.cat]?.c || "#AC66A7";

  const toX = (i) => PL + (i / Math.max(pts.length - 1, 1)) * cw;
  const toY = (v) => PT + ch - (((v - mn) / range) * ch);

  const line = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${toX(i).toFixed(1)},${toY(p.value).toFixed(1)}`).join(' ');
  const area = line + ` L${toX(pts.length-1).toFixed(1)},${(PT+ch).toFixed(1)} L${toX(0).toFixed(1)},${(PT+ch).toFixed(1)} Z`;

  const hiY = def.hi < 999 ? toY(def.hi) : null;
  const loY = def.lo > 0 ? toY(def.lo) : null;
  const gradId = "g_" + marker.replace(/[^a-z0-9]/gi, '');

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%", height:"auto", maxHeight:260}}>
      <defs>
        <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={clr} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={clr} stopOpacity="0.02"/>
        </linearGradient>
      </defs>
      {[0, 0.25, 0.5, 0.75, 1].map(f => <line key={f} x1={PL} y1={PT+ch*f} x2={W-PR} y2={PT+ch*f} stroke="var(--border)" strokeWidth="1"/>)}
      {hiY != null && hiY >= PT && hiY <= PT+ch && (
        <g>
          <line x1={PL} y1={hiY} x2={W-PR} y2={hiY} stroke="#ef6b6b" strokeWidth="1" strokeOpacity="0.45" strokeDasharray="5 4"/>
          <text x={W-PR+3} y={hiY+4} fill="#ef6b6b" fontSize="10" fontWeight="600" fontFamily="var(--mono)">H:{def.hi}</text>
        </g>
      )}
      {loY != null && loY >= PT && loY <= PT+ch && (
        <g>
          <line x1={PL} y1={loY} x2={W-PR} y2={loY} stroke="#f5b041" strokeWidth="1" strokeOpacity="0.45" strokeDasharray="5 4"/>
          <text x={W-PR+3} y={loY+4} fill="#f5b041" fontSize="10" fontWeight="600" fontFamily="var(--mono)">L:{def.lo}</text>
        </g>
      )}
      <path d={area} fill={`url(#${gradId})`}/>
      <path d={line} fill="none" stroke={clr} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
      {pts.map((p, i) => (
        <g key={i}>
          <circle cx={toX(i)} cy={toY(p.value)} r="5" fill="var(--bg)" stroke={clr} strokeWidth="2.5"/>
          <text x={toX(i)} y={toY(p.value)-11} textAnchor="middle" fill={clr} fontSize="11.5" fontWeight="700" fontFamily="var(--mono)">{p.value}</text>

          <text x={toX(i)} y={H-5} textAnchor="middle" fill="var(--t5)" fontSize="9.5" fontWeight="500" fontFamily="var(--mono)">{p.label}</text>
        </g>
      ))}
      <text x={PL-8} y={PT+5} textAnchor="end" fill="var(--t5)" fontSize="10" fontWeight="500" fontFamily="var(--mono)">{mx.toFixed(0)}</text>
      <text x={PL-8} y={PT+ch} textAnchor="end" fill="var(--t5)" fontSize="10" fontWeight="500" fontFamily="var(--mono)">{mn.toFixed(0)}</text>
    </svg>
  );
}

function ClientJourney({client, taskDone, setTaskDone}) {
  const phases = getPhasesForTrack(client.track);
  const [openPhases, setOpenPhases] = useState(new Set([client.currentPhase]));

  const togglePhase = (id) => {
    const n = new Set(openPhases);
    n.has(id) ? n.delete(id) : n.add(id);
    setOpenPhases(n);
  };

  const toggleTask = (tid) => setTaskDone({...taskDone, [tid]: !taskDone[tid]});

  return (
    <div>
      <div className="page-head">
        <div className="page-eyebrow">Your Journey · {client.track === "12-month" ? "12-Month Track" : "12-Week Track"}</div>
        <h1 className="page-title">The {phases.length}-Phase Arc</h1>
        <p className="page-sub">Every step from Day 0 to {client.track === "12-month" ? "Day 380" : "Day 107"}. Your current phase is highlighted.</p>
      </div>

      <div className="phase-timeline">
        {phases.map(phase => {
          const isCurrent = phase.id === client.currentPhase;
          const isDone = phase.id < client.currentPhase;
          const isOpen = openPhases.has(phase.id);
          const tasks = (TASKS[phase.id] || []).filter(t => t.owner === "CL");  // client only sees their tasks
          const doneCount = tasks.filter(t => taskDone[t.id]).length;
          const progress = tasks.length ? doneCount / tasks.length : (isDone ? 1 : 0);
          const hasTBD = (TASKS[phase.id] || []).some(t => t.tbd);

          return (
            <div key={phase.id} className={"phase-item" + (isCurrent ? " current" : "") + (isDone ? " done" : "") + (isOpen ? " open" : "")}>
              <div className="phase-head" onClick={() => togglePhase(phase.id)}>
                <div className="phase-num">{phase.id}</div>
                <div className="phase-meta">
                  <div className="phase-title">{phase.title} {hasTBD && <span className="tbd-chip">TBD</span>}</div>
                  <div className="phase-when">{phase.when}</div>
                </div>
                <div className="phase-status">
                  {tasks.length > 0 && (
                    <div className="phase-prog-mini">
                      <div className="phase-prog-mini-fill" style={{width:`${progress*100}%`}}></div>
                    </div>
                  )}
                  <div className="phase-count">{tasks.length ? `${doneCount}/${tasks.length}` : "-"}</div>
                  <div className="phase-chev">&#9662;</div>
                </div>
              </div>
              <div className="phase-body">
                <div className="phase-body-inner">
                  {(TASKS[phase.id] || []).filter(t => t.owner === "CL").length === 0 ? (
                    <div style={{padding:"14px 0", color:"var(--t5)", fontSize:13}}>Nothing on your plate in this phase. Your team handles this.</div>
                  ) : (
                    (TASKS[phase.id] || []).filter(t => t.owner === "CL").map(t => (
                      <div key={t.id} className={"task-row" + (taskDone[t.id] ? " done" : "")}>
                        <div className={"task-check" + (taskDone[t.id] ? " done" : "")} onClick={() => toggleTask(t.id)}></div>
                        <div className="task-text">
                          {t.task}
                          <div className="task-meta">
                            <span className="task-due">Day {t.dueDay}</span>
                            {t.tbd && <span className="tbd-chip">TBD</span>}
                          </div>
                        </div>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ClientLabs({client}) {
  const [selectedMarker, setSelectedMarker] = useState(null);
  const [catFilter, setCatFilter] = useState("all");

  const draws = client.draws;
  const latestDraw = draws[draws.length - 1];

  if (!draws.length) {
    return (
      <div>
        <div className="page-head">
          <div className="page-eyebrow">Your Labs</div>

        </div>
      </div>
    );
  }

  const markerEntries = Object.entries(BIOMARKERS).filter(([name, def]) => {
    if (catFilter !== "all" && def.cat !== catFilter) return false;
    return latestDraw.values[name] != null;
  });

  const cats = Array.from(new Set(markerEntries.map(([n, def]) => def.cat)));

  if (selectedMarker) {
    const def = BIOMARKERS[selectedMarker];
    const baseVal = draws[0].values[selectedMarker];
    const currVal = latestDraw.values[selectedMarker];
    const status = currVal < def.lo ? "low" : currVal > def.hi ? "high" : "optimal";

    return (
      <div>
        <div style={{marginBottom:18}}>
          <button className="btn btn-sm" onClick={() => setSelectedMarker(null)}>← Back to all markers</button>
        </div>
        <div className="page-head">
          <div className="page-eyebrow">{CAT_COLORS[def.cat].label}</div>
          <h1 className="page-title">{selectedMarker}</h1>
          <p className="page-sub">{def.desc}</p>
        </div>

        <div className="card" style={{marginBottom:20}}>
          <div className="card-head">
            <div>
              <div className="card-title">Trend Across Draws</div>
              <div className="card-sub">Your values over time vs reference range</div>
            </div>
            <span className={"badge " + (status==="optimal"?"badge-green":status==="low"?"badge-amber":"badge-red")}>
              <span className="badge-dot"></span>{status === "optimal" ? "In Range" : status === "low" ? "Below Range" : "Above Range"}
            </span>
          </div>
          <div className="chart-wrap">
            <BiomarkerChart marker={selectedMarker} draws={draws}/>
          </div>
        </div>

        <div className="grid-3">
          <div className="stat-tile">
            <div className="stat-tile-lbl">Baseline</div>
            <div className="stat-tile-val">{baseVal} <span style={{fontSize:11, color:"var(--t5)"}}>{def.unit}</span></div>
          </div>
          <div className="stat-tile">
            <div className="stat-tile-lbl">Current</div>
            <div className="stat-tile-val" style={{color:"var(--purple3)"}}>{currVal} <span style={{fontSize:11, color:"var(--t5)"}}>{def.unit}</span></div>
          </div>
          <div className="stat-tile">
            <div className="stat-tile-lbl">Reference Range</div>
            <div className="stat-tile-val" style={{fontSize:16}}>{def.lo} - {def.hi < 999 ? def.hi : "+"} <span style={{fontSize:11, color:"var(--t5)"}}>{def.unit}</span></div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="page-head">
        <div className="page-eyebrow">Your Labs</div>
        <h1 className="page-title">Your Biomarkers</h1>
        <p className="page-sub">{draws.length} draw{draws.length>1?"s":""} · Latest: {latestDraw.label} ({latestDraw.date})</p>
      </div>

      <div className="tab-nav" style={{marginBottom:16}}>
        <button className={"tab-btn" + (catFilter==="all"?" active":"")} onClick={()=>setCatFilter("all")}>All <span className="count">{Object.keys(BIOMARKERS).filter(m => latestDraw.values[m] != null).length}</span></button>
        {cats.map(c => (
          <button key={c} className={"tab-btn" + (catFilter===c?" active":"")} onClick={()=>setCatFilter(c)}>
            {CAT_COLORS[c].label}
          </button>
        ))}
      </div>

      <div className="marker-grid">
        {markerEntries.map(([name, def]) => {
          const curr = latestDraw.values[name];
          const base = draws[0].values[name];
          const delta = curr - base;
          const pct = base !== 0 ? (delta / base) * 100 : 0;
          const status = curr < def.lo ? "low" : curr > def.hi ? "high" : "optimal";
          const statusColor = status === "optimal" ? "var(--green)" : status === "low" ? "var(--amber)" : "var(--red)";

          return (
            <div key={name} className="marker-card" onClick={() => setSelectedMarker(name)}>
              <div className="marker-name">{name}</div>
              <div className="marker-cat" style={{color: CAT_COLORS[def.cat].c}}>{CAT_COLORS[def.cat].label}</div>
              <div className="marker-val-row">
                <span className="marker-val">{curr}</span>
                <span className="marker-unit">{def.unit}</span>
              </div>
              <div className="marker-status" style={{color:statusColor}}>
                <span className="badge-dot"></span>{status === "optimal" ? "In Range" : status === "low" ? "Low" : "High"}
                {draws.length > 1 && (
                  <span style={{marginLeft:8, color: delta > 0 ? (name === "hs-CRP" || name === "ALT" || name === "AST" || name === "Triglycerides" || name === "LDL" || name === "ApoB" || name === "Homocysteine" ? "var(--red)" : "var(--green)") : (name === "hs-CRP" || name === "ALT" || name === "AST" || name === "Triglycerides" || name === "LDL" || name === "ApoB" || name === "Homocysteine" ? "var(--green)" : "var(--red)")}}>
                    {delta > 0 ? "↑" : "↓"} {Math.abs(pct).toFixed(0)}%
                  </span>
                )}
              </div>
              <div className="marker-range">Range: {def.lo} to {def.hi < 999 ? def.hi : "+"}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function CoachClientDetail({clientId, setActiveClientId, taskDone, setTaskDone}) {
  const [tab, setTab] = useState("journey");
  const [openPhases, setOpenPhases] = useState(new Set());
  const client = CLIENTS.find(c => c.id === clientId);
  if (!client) return null;

  const phases = getPhasesForTrack(client.track);
  const totalDays = client.track === "12-month" ? 380 : 107;

  const togglePhase = (id) => {
    const n = new Set(openPhases);
    n.has(id) ? n.delete(id) : n.add(id);
    setOpenPhases(n);
  };
  const toggleTask = (tid) => setTaskDone({...taskDone, [tid]: !taskDone[tid]});

  return (
    <div>
      <div className="page-head">
        <div className="page-eyebrow">Coach View · Client Deep-Dive</div>
        <h1 className="page-title">{client.name}</h1>
        <p className="page-sub">{client.age}y {client.sex} · {client.track === "12-month" ? "12-Month" : "12-Week"} Elite · Day {client.dayOfJourney} of {totalDays} · Goals: {client.goals}</p>
      </div>

      <div style={{marginBottom:14, display:"flex", gap:8, flexWrap:"wrap"}}>
        {CLIENTS.map(c => (
          <button key={c.id} className={"btn btn-sm"+(c.id===clientId?" btn-primary":"")} onClick={()=>setActiveClientId(c.id)}>{c.initials} {c.name.split(' ')[0]}</button>
        ))}
      </div>

      <div className="tab-nav">
        <button className={"tab-btn"+(tab==="journey"?" active":"")} onClick={()=>setTab("journey")}>Journey Tracker</button>
        <button className={"tab-btn"+(tab==="labs"?" active":"")} onClick={()=>setTab("labs")}>Labs</button>
        <button className={"tab-btn"+(tab==="protocol"?" active":"")} onClick={()=>setTab("protocol")}>Protocol</button>
        <button className={"tab-btn"+(tab==="notes"?" active":"")} onClick={()=>setTab("notes")}>Notes</button>
      </div>

      {tab === "journey" && (
        <div className="phase-timeline">
          {phases.map(phase => {
            const isCurrent = phase.id === client.currentPhase;
            const isDone = phase.id < client.currentPhase;
            const isOpen = openPhases.has(phase.id);
            const tasks = TASKS[phase.id] || [];
            const doneCount = tasks.filter(t => taskDone[t.id]).length;
            const progress = tasks.length ? doneCount / tasks.length : (isDone ? 1 : 0);
            const hasTBD = tasks.some(t => t.tbd);

            return (
              <div key={phase.id} className={"phase-item" + (isCurrent ? " current" : "") + (isDone ? " done" : "") + (isOpen ? " open" : "")}>
                <div className="phase-head" onClick={() => togglePhase(phase.id)}>
                  <div className="phase-num">{phase.id}</div>
                  <div className="phase-meta">
                    <div className="phase-title">{phase.title} {hasTBD && <span className="tbd-chip">TBD</span>}</div>
                    <div className="phase-when">{phase.when}</div>
                  </div>
                  <div className="phase-status">
                    <div className="phase-prog-mini"><div className="phase-prog-mini-fill" style={{width:`${progress*100}%`}}></div></div>
                    <div className="phase-count">{doneCount}/{tasks.length}</div>
                    <div className="phase-chev">&#9662;</div>
                  </div>
                </div>
                <div className="phase-body">
                  <div className="phase-body-inner">
                    {tasks.map(t => (
                      <div key={t.id} className={"task-row" + (taskDone[t.id] ? " done" : "")}>
                        <div className={"task-check" + (taskDone[t.id] ? " done" : "")} onClick={() => toggleTask(t.id)}></div>
                        <div className="task-text">
                          {t.task}
                          <div className="task-meta">
                            <span className={"pill pill-role-"+t.owner}>{ROLE_SHORT[t.owner]}</span>
                            <span className="task-due">Day {t.dueDay}</span>
                            {t.tbd && <span className="tbd-chip">TBD: {t.tbd}</span>}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {tab === "labs" && <CoachClientLabs client={client}/>}
      {tab === "protocol" && <CoachClientProtocol client={client}/>}
      {tab === "notes" && <CoachClientNotes client={client}/>}
    </div>
  );
}

    <div className="marker-grid">
      {markers.map(m => {
        const def = BIOMARKERS[m];
        const curr = latest.values[m];
        const base = client.draws[0].values[m];
        const status = curr < def.lo ? "low" : curr > def.hi ? "high" : "optimal";
        const statusColor = status === "optimal" ? "var(--green)" : status === "low" ? "var(--amber)" : "var(--red)";
        return (
          <div key={m} className="marker-card">
            <div className="marker-name">{m}</div>
            <div className="marker-cat" style={{color: CAT_COLORS[def.cat].c}}>{CAT_COLORS[def.cat].label}</div>
            <div className="marker-val-row">
              <span className="marker-val">{curr}</span>
              <span className="marker-unit">{def.unit}</span>
              {base !== curr && <span style={{fontSize:10, color:"var(--t5)", fontFamily:"var(--mono)"}}>(from {base})</span>}
            </div>
            <div className="marker-status" style={{color:statusColor}}>
              <span className="badge-dot"></span>{status === "optimal" ? "In Range" : status === "low" ? "Low" : "High"}
            </div>
          </div>
        );
      })}
    </div>
  );
}

        {filtered.map((t, i) => (
          <div key={i} className="task-row">
            <div className="task-check"></div>
            <div className="task-text">
              {t.task}
              <div className="task-meta">
                <span className={"pill pill-role-"+t.owner}>{ROLE_SHORT[t.owner]}</span>
                <span style={{fontSize:11, color:"var(--t4)"}}>{t.client}</span>
                <span className="task-due">Day {t.dueDay}</span>
                {t.tbd && <span className="tbd-chip">TBD</span>}
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AdminPipeline() {
  return (
    <div>
      <div className="page-head">
        <div className="page-eyebrow">Operations</div>
        <h1 className="page-title">Pipeline Status</h1>
        <p className="page-sub">GHL stages · every client bucketed</p>
      </div>

      <TBDBanner type="renewal-pricing"/>
      <TBDBanner type="rhythm-step-down"/>

      <CoachPipeline/>
    </div>
  );
}

// ============================================================================
// MOUNT
// ============================================================================

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
